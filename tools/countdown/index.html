<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Countdown // Xi-Void Tools</title>
  <style>
    :root {
      --bg: #000;
      --green: #00ff66;
      --green-soft: rgba(0, 255, 102, 0.72);
      --green-faint: rgba(0, 255, 102, 0.13);
      --panel: rgba(0, 0, 0, 0.82);
      --border: rgba(0, 255, 102, 0.36);
      --text: #d8ffe5;
      --muted: #79a989;
      --alarm: #ff5a5a;
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; background: var(--bg); }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at center, rgba(0, 255, 102, 0.13), transparent 34rem),
        linear-gradient(135deg, rgba(0, 255, 102, 0.08), transparent 38%),
        #000;
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 42%, rgba(0, 0, 0, 0.78) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.024),
          rgba(255, 255, 255, 0.024) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
    }

    .screen {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 2rem);
      padding-top: calc(clamp(1rem, 4vw, 2rem) + env(safe-area-inset-top));
      padding-bottom: calc(clamp(1rem, 4vw, 2rem) + env(safe-area-inset-bottom));
    }

    main {
      width: min(720px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow:
        0 0 28px rgba(0, 255, 102, 0.12),
        inset 0 0 20px rgba(0, 255, 102, 0.04);
      padding: clamp(1.15rem, 5vw, 2.4rem);
    }

    .back {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }

    .back:hover, .back:focus { color: var(--green); outline: none; }

    .sigil {
      color: var(--green);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: clamp(0.72rem, 2.4vw, 0.82rem);
      line-height: 1.45;
      margin-bottom: 0.8rem;
      opacity: 0.85;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(1.9rem, 9vw, 3.2rem);
      line-height: 0.98;
      letter-spacing: 0.02em;
      text-shadow: 0 0 18px rgba(0, 255, 102, 0.38);
    }

    .subtitle {
      margin: 1rem 0 1.6rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 58ch;
      font-size: clamp(0.92rem, 3.5vw, 1rem);
    }

    .display {
      text-align: center;
      color: var(--green);
      font-size: clamp(2.6rem, 16vw, 5.5rem);
      line-height: 1;
      letter-spacing: 0.04em;
      text-shadow: 0 0 22px rgba(0, 255, 102, 0.35);
      padding: 1.2rem 0;
      font-variant-numeric: tabular-nums;
    }

    .display.done {
      color: var(--alarm);
      text-shadow: 0 0 22px rgba(255, 90, 90, 0.5);
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink { 50% { opacity: 0.25; } }

    .inputs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .field { text-align: center; }

    .field label {
      display: block;
      color: var(--green);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .field input {
      width: 4.5rem;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 1.4rem;
      text-align: center;
      padding: 0.5rem;
    }

    .field input:focus { outline: none; border-color: var(--green-soft); }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
    }

    button {
      cursor: pointer;
      background: var(--green-faint);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 0.9rem;
    }

    button:hover, button:focus {
      color: var(--green);
      border-color: var(--green-soft);
      background: rgba(0, 255, 102, 0.22);
      outline: none;
    }

    button.primary { border-color: var(--green-soft); color: var(--green); }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .preset {
      font-size: 0.72rem;
      padding: 0.4rem 0.7rem;
    }

    footer {
      margin-top: 1.6rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="screen">
    <main>
      <a class="back" href="/">← back to tools</a>
      <div class="sigil">temporal decay // controlled descent</div>
      <h1>COUNTDOWN</h1>
      <p class="subtitle">
        Set a duration and watch it drain. Runs entirely in this tab; when it
        hits zero the display flares and a tone sounds.
      </p>

      <div class="display" id="display">00:00:00</div>

      <div class="inputs">
        <div class="field">
          <label for="hh">hours</label>
          <input id="hh" type="number" min="0" max="99" value="0" inputmode="numeric">
        </div>
        <div class="field">
          <label for="mm">minutes</label>
          <input id="mm" type="number" min="0" max="59" value="5" inputmode="numeric">
        </div>
        <div class="field">
          <label for="ss">seconds</label>
          <input id="ss" type="number" min="0" max="59" value="0" inputmode="numeric">
        </div>
      </div>

      <div class="presets">
        <button class="preset" type="button" data-secs="60">1 min</button>
        <button class="preset" type="button" data-secs="300">5 min</button>
        <button class="preset" type="button" data-secs="600">10 min</button>
        <button class="preset" type="button" data-secs="1500">25 min</button>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn" type="button">start</button>
        <button id="pauseBtn" type="button" disabled>pause</button>
        <button id="resetBtn" type="button">reset</button>
      </div>

      <footer>
        Δ local timer // no network // entropy contained
      </footer>
    </main>
  </div>

  <script>
    const display = document.getElementById("display");
    const hh = document.getElementById("hh");
    const mm = document.getElementById("mm");
    const ss = document.getElementById("ss");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");

    let remaining = 0;     // ms remaining
    let endTime = 0;       // timestamp the countdown ends
    let ticker = null;
    let running = false;

    function clampInputs() {
      const h = Math.min(99, Math.max(0, parseInt(hh.value, 10) || 0));
      const m = Math.min(59, Math.max(0, parseInt(mm.value, 10) || 0));
      const s = Math.min(59, Math.max(0, parseInt(ss.value, 10) || 0));
      hh.value = h; mm.value = m; ss.value = s;
      return (h * 3600 + m * 60 + s) * 1000;
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function render(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      display.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function setInputsEnabled(on) {
      [hh, mm, ss].forEach(el => { el.disabled = !on; });
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.value = 660;
        gain.gain.value = 0.12;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        let count = 0;
        const pulse = setInterval(() => {
          osc.frequency.value = osc.frequency.value === 660 ? 880 : 660;
          if (++count >= 6) { clearInterval(pulse); osc.stop(); ctx.close(); }
        }, 220);
      } catch (e) { /* audio unavailable */ }
    }

    function finish() {
      stopTicker();
      running = false;
      remaining = 0;
      render(0);
      display.classList.add("done");
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      setInputsEnabled(true);
      beep();
    }

    function stopTicker() {
      if (ticker) { clearInterval(ticker); ticker = null; }
    }

    function tick() {
      remaining = endTime - Date.now();
      if (remaining <= 0) { finish(); return; }
      render(remaining);
    }

    function start() {
      display.classList.remove("done");
      if (remaining <= 0) remaining = clampInputs();
      if (remaining <= 0) return;
      endTime = Date.now() + remaining;
      running = true;
      stopTicker();
      ticker = setInterval(tick, 200);
      render(remaining);
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      setInputsEnabled(false);
    }

    function pause() {
      if (!running) return;
      stopTicker();
      remaining = endTime - Date.now();
      running = false;
      startBtn.disabled = false;
      pauseBtn.disabled = true;
    }

    function reset() {
      stopTicker();
      running = false;
      remaining = 0;
      display.classList.remove("done");
      setInputsEnabled(true);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      render(clampInputs());
    }

    startBtn.addEventListener("click", start);
    pauseBtn.addEventListener("click", pause);
    resetBtn.addEventListener("click", reset);

    [hh, mm, ss].forEach(el => el.addEventListener("input", () => {
      if (!running) render(clampInputs());
    }));

    document.querySelectorAll(".preset").forEach(btn => {
      btn.addEventListener("click", () => {
        const secs = parseInt(btn.dataset.secs, 10);
        hh.value = Math.floor(secs / 3600);
        mm.value = Math.floor((secs % 3600) / 60);
        ss.value = secs % 60;
        reset();
      });
    });

    render(clampInputs());
  </script>
</body>
</html>

<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">  <title>Xi-Void Tools</title>  <style>
    :root {
      --bg: #000;
      --green: #00ff66;
      --green-soft: rgba(0, 255, 102, 0.72);
      --green-faint: rgba(0, 255, 102, 0.13);
      --panel: rgba(0, 0, 0, 0.82);
      --border: rgba(0, 255, 102, 0.36);
      --text: #d8ffe5;
      --muted: #79a989;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at center, rgba(0, 255, 102, 0.13), transparent 34rem),
        linear-gradient(135deg, rgba(0, 255, 102, 0.08), transparent 38%),
        #000;
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      overflow-x: hidden;
    }

    body::before {
      content:
        "вҲ… ПҲ вҹЎ вҶҜ вҲҮ О¶ О© О” Оһ ОЈ ПҶ в§¬ в—¬ вқ– вҳҗ вҳҚ вҡҳ вҡҡ вҡ— вҡ– вҡҷ "
        "вҳ° вҳұ вҳІ вҳі вҳҙ вҳө вҳ¶ вҳ· вҲҖ вҲғ вҲ„ В¬ вҲ§ вҲЁ вҠ• вҠ— вҠҳ вҠҷ вҠҘ вҠӨ "
        "бӣғ бҡў бҡұ бҡ· бҡЁ бҡҫ бӣҒ бӣҮ бӣү бӣӢ р“ӮҖ р“ҶЈ р“…“ р“Ӯ» р“ғ° "
        "вҷ” вҷ• вҷ– вҷ— вҷҳ вҷҷ вҷҡ вҷӣ вҷң вҷқ вҷһ вҷҹ в–® в–Ҝ в–° в–ұ в–  в–Ў в—Ҷ в—Ү в–І в–і в–ј в–Ҫ";
      position: fixed;
      inset: 0;
      z-index: 0;
      padding: 1.2rem;
      color: rgba(0, 255, 102, 0.08);
      font-size: clamp(1rem, 3vw, 2.2rem);
      line-height: 1.9;
      letter-spacing: 0.35em;
      word-spacing: 0.8em;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 42%, rgba(0, 0, 0, 0.78) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.024),
          rgba(255, 255, 255, 0.024) 1px,
          transparent 1px,
          transparent 4px
        );
      pointer-events: none;
    }

    .screen {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 2rem);
      padding-top: calc(clamp(1rem, 4vw, 2rem) + env(safe-area-inset-top));
      padding-bottom: calc(clamp(1rem, 4vw, 2rem) + env(safe-area-inset-bottom));
    }

    main {
      width: min(720px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow:
        0 0 28px rgba(0, 255, 102, 0.12),
        inset 0 0 20px rgba(0, 255, 102, 0.04);
      padding: clamp(1.15rem, 5vw, 2.4rem);
    }

    .sigil {
      color: var(--green);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: clamp(0.72rem, 2.4vw, 0.82rem);
      line-height: 1.45;
      margin-bottom: 1rem;
      opacity: 0.85;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(2.3rem, 14vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      text-shadow: 0 0 18px rgba(0, 255, 102, 0.38);
    }

    .subtitle {
      margin: 1.1rem 0 1.8rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 58ch;
      font-size: clamp(0.95rem, 3.7vw, 1.05rem);
    }

    .tools {
      display: grid;
      gap: 0.85rem;
    }

    .tool-link {
      display: block;
      border: 1px solid var(--border);
      background: var(--green-faint);
      color: var(--text);
      text-decoration: none;
      padding: 0.95rem;
    }

    .tool-link:hover,
    .tool-link:focus {
      background: rgba(0, 255, 102, 0.22);
      border-color: var(--green-soft);
      transform: translateX(0.25rem);
      outline: none;
    }

    .tool-title {
      display: block;
      color: var(--green);
      font-weight: bold;
      font-size: clamp(1rem, 4.5vw, 1.2rem);
      margin-bottom: 0.35rem;
    }

    .tool-path {
      display: block;
      color: var(--muted);
      font-size: clamp(0.78rem, 3.5vw, 0.9rem);
      overflow-wrap: anywhere;
    }

    footer {
      margin-top: 1.6rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      .screen {
        padding-left: 0.8rem;
        padding-right: 0.8rem;
      }

      main {
        padding: 1rem;
      }

      .sigil {
        letter-spacing: 0.13em;
      }

      .subtitle {
        margin-bottom: 1.4rem;
      }

      .tool-link {
        padding: 0.85rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .tool-link:hover,
      .tool-link:focus {
        transform: none;
      }
    }
  </style></head><body>
  <div class="screen">
    <main>
      <div class="sigil">recursive tools // local implements</div>  <h1>XI-VOID<br>TOOLS</h1>

  <p class="subtitle">
    Small utilities compiled for text mutation, field notation, dead-web repair,
    and other harmless acts of symbolic damage.
  </p>

  <nav class="tools" aria-label="Tools">
    <a class="tool-link" href="/stuff/fraktur-forge">
      <span class="tool-title">Fraktur Forge</span>
      <span class="tool-path">/fraktur-forge</span>
    </a>

    <a class="tool-link" href="/stuff/notepad">
      <span class="tool-title">Notepad</span>
      <span class="tool-path">/stuff/notepad</span>
    </a>
  </nav>

  <footer>
    О” static node // tools exposed // entropy contained
  </footer>
</main>

  </div>
</body>
</html>
